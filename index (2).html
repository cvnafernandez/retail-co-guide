<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CO VITU Registration Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#f0f2f5;color:#1e293b;overflow:hidden;height:100vh;}

/* ── APP HEADER ─────────────────────────────────── */
.app-header{
  height:56px;background:#0f172a;color:#fff;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;position:sticky;top:0;z-index:200;
  box-shadow:0 2px 8px rgba(0,0,0,.4);
}
.app-header-brand{display:flex;align-items:center;gap:10px;}
.app-header-logo{
  width:34px;height:34px;background:#2563eb;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:800;color:#fff;letter-spacing:-.5px;
}
.app-header-title{font-size:15px;font-weight:700;}
.app-header-sub{font-size:11px;color:#64748b;margin-top:1px;}
.app-header-right{display:flex;align-items:center;gap:14px;}
.progress-wrap{display:flex;align-items:center;gap:8px;}
.prog-bar{width:160px;height:5px;background:#1e293b;border-radius:999px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,#3b82f6,#22c55e);border-radius:999px;transition:width .4s;}
.prog-text{font-size:11px;color:#64748b;white-space:nowrap;}
.state-badge{
  background:#1e3a5f;color:#60a5fa;font-size:10px;font-weight:700;
  padding:4px 10px;border-radius:999px;border:1px solid #2563eb55;letter-spacing:.04em;
}

/* ── THREE-COLUMN LAYOUT ─────────────────────────── */
.app-body{display:flex;height:calc(100vh - 56px);}

/* ── LEFT NAV ───────────────────────────────────── */
.nav-col{
  width:210px;min-width:210px;background:#fff;
  border-right:1px solid #e2e8f0;overflow-y:auto;
  padding:10px 0 20px;
}
.nav-group-label{
  font-size:9.5px;font-weight:700;text-transform:uppercase;
  letter-spacing:.1em;color:#94a3b8;padding:10px 14px 5px;
}
.nav-item{
  display:flex;align-items:center;gap:8px;
  padding:8px 14px;cursor:pointer;border-left:3px solid transparent;
  transition:all .12s;
}
.nav-item:hover{background:#f8fafc;}
.nav-item.active{background:#eff6ff;border-left-color:#2563eb;}
.nav-item.active .nav-txt{color:#2563eb;font-weight:600;}
.nav-ico{font-size:14px;flex-shrink:0;width:18px;text-align:center;}
.nav-txt{font-size:12px;color:#475569;flex:1;line-height:1.3;}
.nav-right-wrap{display:flex;align-items:center;gap:4px;}
.risk-chip{
  font-size:8.5px;font-weight:700;padding:2px 5px;
  border-radius:3px;text-transform:uppercase;
}
.rh{background:#fee2e2;color:#dc2626;}
.rm{background:#fef3c7;color:#b45309;}
.rl{background:#dcfce7;color:#15803d;}
.nav-chk{font-size:12px;}
.nav-chk.done{color:#22c55e;}
.nav-chk.pend{color:#cbd5e1;}

/* ── CENTER PORTAL ───────────────────────────────── */
.portal-col{
  flex:1;overflow-y:auto;background:#f0f2f5;
  padding:20px 18px 40px;
}

/* VITU-style section wrapper */
.vitu-section{background:#fff;border:1px solid #d1d5db;border-radius:0;}
.vitu-sec-header{
  background:#fff;border-bottom:2px solid #0070c0;
  padding:10px 14px;display:flex;align-items:center;justify-content:space-between;
}
.vitu-sec-title{font-size:13px;font-weight:700;text-transform:uppercase;color:#1e293b;letter-spacing:.04em;}
.vitu-populate-btn{
  background:#28a745;color:#fff;border:none;padding:5px 12px;
  border-radius:3px;font-size:11px;font-weight:600;cursor:pointer;
  transition:background .15s;
}
.vitu-populate-btn:hover{background:#218838;}

/* VITU summary bar (Vehicle Info style) */
.vitu-summary-bar{
  background:#cce5ff;border-bottom:1px solid #b8daff;
  display:flex;padding:8px 14px;gap:0;
}
.vitu-summary-item{flex:1;padding:0 10px;}
.vitu-summary-item:first-child{padding-left:0;}
.vitu-summary-label{font-size:10px;color:#004085;font-weight:600;text-transform:none;}
.vitu-summary-value{font-size:12px;color:#004085;font-weight:400;margin-top:1px;}

/* Form body */
.vitu-body{padding:14px;}
.vitu-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px;}
.vitu-row:last-child{margin-bottom:0;}

/* Field wrapper */
.vf{display:flex;flex-direction:column;min-width:0;}
.vf.w1{flex:1 1 120px;}
.vf.w2{flex:2 1 200px;}
.vf.w3{flex:3 1 260px;}
.vf.w4{flex:4 1 100%;}
.vf.wfull{flex:1 1 100%;}
.vf.wradio{flex:0 0 auto;}

/* Label */
.vf-label{
  font-size:11px;color:#1565c0;font-weight:500;
  margin-bottom:3px;display:flex;align-items:center;gap:3px;
  cursor:pointer;
}
.vf-label .req{color:#e53935;font-weight:700;font-size:11px;}

/* Inputs styled like VITU */
.vf input[type=text],
.vf select,
.vf input[type=date]{
  width:100%;padding:5px 7px;
  border:1px solid #9e9e9e;border-radius:2px;
  font-size:12px;color:#1e293b;background:#fff;
  font-family:inherit;outline:none;
  transition:border-color .15s, box-shadow .15s;
  cursor:pointer;
}
.vf input[type=text]:focus,
.vf select:focus,
.vf input[type=date]:focus{
  border-color:#0070c0;
  box-shadow:0 0 0 2px rgba(0,112,192,.15);
}
.vf input[type=text].status-auto,
.vf select.status-auto{background:#f0fdf4;border-color:#86efac;}
.vf input[type=text].status-blank,
.vf select.status-blank{background:#f8f9fa;color:#9ca3af;font-style:italic;}
.vf input[type=text].status-manual,
.vf select.status-manual{background:#fff7ed;border-color:#fcd34d;}
.vf input[type=text].status-verify,
.vf select.status-verify{background:#eff6ff;border-color:#93c5fd;}

/* Field active highlight */
.vf.active .vf-label{color:#0070c0;font-weight:700;}
.vf.active input[type=text],
.vf.active select,
.vf.active input[type=date]{
  border-color:#0070c0;
  box-shadow:0 0 0 3px rgba(0,112,192,.2);
}

/* Radio groups */
.radio-group{display:flex;gap:14px;align-items:center;margin-top:4px;}
.radio-group label{
  display:flex;align-items:center;gap:5px;
  font-size:12px;color:#1e293b;cursor:pointer;font-weight:400;
}
.radio-group input[type=radio]{
  width:14px;height:14px;cursor:pointer;accent-color:#0070c0;
}

/* Checkbox row */
.checkbox-row{display:flex;align-items:center;gap:6px;margin-top:4px;}
.checkbox-row input[type=checkbox]{
  width:14px;height:14px;cursor:pointer;accent-color:#0070c0;
}
.checkbox-row label{font-size:12px;color:#1e293b;cursor:pointer;}

/* Section divider label */
.vitu-divider{
  background:#f8f9fa;border-top:1px solid #e2e8f0;border-bottom:1px solid #e2e8f0;
  padding:6px 14px;font-size:11px;color:#64748b;font-weight:600;
  text-transform:uppercase;letter-spacing:.05em;
}

/* Final steps */
.final-checklist{padding:14px;}
.final-step-row{
  display:flex;align-items:flex-start;gap:12px;
  padding:12px 14px;border:1px solid #e2e8f0;border-radius:6px;
  margin-bottom:8px;cursor:pointer;background:#fff;
  transition:all .15s;
}
.final-step-row:hover{background:#f8fafc;border-color:#cbd5e1;}
.final-step-row.done{background:#f0fdf4;border-color:#86efac;}
.final-step-row input[type=checkbox]{
  width:18px;height:18px;flex-shrink:0;margin-top:1px;
  cursor:pointer;accent-color:#22c55e;
}
.fs-label{font-size:13px;font-weight:600;color:#1e293b;}
.final-step-row.done .fs-label{text-decoration:line-through;color:#15803d;}
.fs-note{font-size:11px;color:#64748b;margin-top:2px;line-height:1.4;}

/* Hold risk banner above the portal */
.hold-bar{
  border-radius:6px;padding:10px 14px;margin-bottom:12px;
  display:flex;align-items:flex-start;gap:10px;border:1px solid;
}
.hold-bar.high{background:#fef2f2;border-color:#fca5a5;}
.hold-bar.med{background:#fffbeb;border-color:#fde68a;}
.hold-bar.low{background:#f0fdf4;border-color:#86efac;}
.hold-bar-ico{font-size:18px;line-height:1;flex-shrink:0;}
.hold-bar-body{}
.hold-bar-title{font-size:12px;font-weight:700;margin-bottom:2px;}
.hold-bar.high .hold-bar-title{color:#dc2626;}
.hold-bar.med .hold-bar-title{color:#b45309;}
.hold-bar.low .hold-bar-title{color:#15803d;}
.hold-bar-text{font-size:12px;color:#475569;line-height:1.5;}

/* Mark complete button */
.mark-btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:9px 20px;border-radius:6px;border:none;
  font-size:13px;font-weight:600;cursor:pointer;
  margin-top:14px;transition:all .15s;
}
.mark-btn.todo{background:#2563eb;color:#fff;}
.mark-btn.todo:hover{background:#1d4ed8;}
.mark-btn.done{background:#22c55e;color:#fff;cursor:default;}
.next-btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:9px 20px;border-radius:6px;border:1px solid #e2e8f0;
  background:#fff;color:#1e293b;font-size:13px;font-weight:600;
  cursor:pointer;margin-top:14px;margin-left:8px;transition:all .15s;
  font-family:inherit;
}
.next-btn:hover{background:#f8fafc;}

/* ── RIGHT GUIDE PANEL ──────────────────────────── */
.guide-col{
  width:300px;min-width:300px;background:#fff;
  border-left:1px solid #e2e8f0;overflow-y:auto;
  display:flex;flex-direction:column;
}
.guide-header{
  background:#0f172a;color:#fff;
  padding:12px 16px;font-size:13px;font-weight:700;
  flex-shrink:0;border-bottom:1px solid #1e293b;
  display:flex;align-items:center;gap:8px;
}
.guide-header .guide-icon{font-size:16px;}
.guide-body{flex:1;padding:0;overflow-y:auto;}

/* Idle state: full checklist */
.guide-checklist{padding:14px;}
.guide-sec-badge{
  font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;color:#94a3b8;margin-bottom:10px;
  padding-bottom:8px;border-bottom:1px solid #e2e8f0;
}
.guide-field-row{
  display:flex;align-items:flex-start;gap:8px;
  padding:8px 10px;border-radius:6px;cursor:pointer;
  margin-bottom:3px;transition:background .12s;
  border:1px solid transparent;
}
.guide-field-row:hover{background:#f8fafc;border-color:#e2e8f0;}
.guide-field-row.active{background:#eff6ff;border-color:#bfdbfe;}
.guide-field-dot{
  width:9px;height:9px;border-radius:2px;flex-shrink:0;margin-top:3px;
}
.dot-auto{background:#22c55e;}
.dot-verify{background:#f59e0b;}
.dot-manual{background:#ef4444;}
.dot-blank{background:#94a3b8;}
.guide-field-name{font-size:12px;color:#374151;flex:1;line-height:1.3;}
.guide-field-badge{
  font-size:8.5px;font-weight:700;padding:2px 5px;
  border-radius:3px;text-transform:uppercase;flex-shrink:0;
}
.gb-auto{background:#dcfce7;color:#15803d;}
.gb-verify{background:#fef3c7;color:#92400e;}
.gb-manual{background:#fee2e2;color:#b91c1c;}
.gb-blank{background:#f1f5f9;color:#64748b;}

/* Active field detail */
.guide-detail{padding:0;}
.gd-back{
  padding:10px 14px;font-size:11px;color:#2563eb;font-weight:600;
  cursor:pointer;display:flex;align-items:center;gap:5px;
  border-bottom:1px solid #e2e8f0;background:#f8fafc;
}
.gd-back:hover{background:#eff6ff;}
.gd-status-bar{
  padding:12px 14px;border-bottom:1px solid #e2e8f0;
}
.gd-status-chip{
  display:inline-flex;align-items:center;gap:6px;
  font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;
  text-transform:uppercase;letter-spacing:.05em;
}
.gd-sc-auto{background:#dcfce7;color:#15803d;}
.gd-sc-verify{background:#fef3c7;color:#92400e;}
.gd-sc-manual{background:#fee2e2;color:#b91c1c;}
.gd-sc-blank{background:#f1f5f9;color:#64748b;}
.gd-fieldname{font-size:16px;font-weight:700;color:#0f172a;margin-top:8px;}
.gd-content{padding:14px;}
.gd-section-label{
  font-size:9.5px;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;color:#94a3b8;margin-bottom:6px;margin-top:14px;
}
.gd-section-label:first-child{margin-top:0;}
.gd-tip{
  font-size:13px;color:#374151;line-height:1.6;
  background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;
  padding:10px 12px;
}
.gd-source{
  font-size:12px;color:#475569;display:flex;align-items:flex-start;
  gap:6px;padding:8px 12px;background:#f0f9ff;border-radius:6px;
  border:1px solid #bae6fd;
}
.gd-warning{
  font-size:12px;color:#92400e;background:#fffbeb;border:1px solid #fde68a;
  border-radius:6px;padding:8px 12px;display:flex;gap:6px;
}
.gd-legend{
  display:flex;flex-direction:column;gap:5px;
  padding:10px;border:1px solid #e2e8f0;border-radius:6px;background:#f8fafc;
  margin-top:2px;
}
.gd-legend-item{display:flex;align-items:center;gap:7px;font-size:11px;color:#475569;}

/* Scrollbars */
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:999px;}
::-webkit-scrollbar-thumb:hover{background:#94a3b8;}
</style>
</head>
<body>

<!-- APP HEADER -->
<div class="app-header">
  <div class="app-header-brand">
    <div class="app-header-logo">CO</div>
    <div>
      <div class="app-header-title">VITU Registration Guide</div>
      <div class="app-header-sub">Colorado In-State Title &amp; Registration — Specialist Reference</div>
    </div>
  </div>
  <div class="app-header-right">
    <div class="state-badge">Colorado In-State</div>
    <div class="progress-wrap">
      <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
      <div class="prog-text" id="progText">0 / 14 sections</div>
    </div>
  </div>
</div>

<!-- THREE COLUMNS -->
<div class="app-body">
  <aside class="nav-col" id="navCol"></aside>
  <main class="portal-col" id="portalCol"></main>
  <aside class="guide-col">
    <div class="guide-header"><span class="guide-icon">📋</span> Field Guide</div>
    <div class="guide-body" id="guideBody"></div>
  </aside>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
// FIELD DEFINITIONS
// status: 'auto' | 'verify' | 'manual' | 'blank'
// type:   'text' | 'select' | 'radio' | 'checkbox' | 'date'
// ══════════════════════════════════════════════════════════════════
const F = {
  // TRANSACTION
  location:        { label:'Location', req:true, type:'select', status:'verify', placeholder:'— Verify auto-selected location —', tip:'Defaults automatically to a location. Confirm it is the correct dealership location before proceeding.', source:'Auto-populated — verify', warning:null },
  titlingState:    { label:'Titling State', req:true, type:'select', status:'manual', placeholder:'Colorado (CO)', tip:'Must be set to Colorado (CO). If it defaults to another state, correct it immediately before moving forward.', source:'Manually set', warning:'Incorrect state is one of the most common hold causes' },
  acquisitionType: { label:'Acquisition Type', req:true, type:'select', status:'manual', placeholder:'Colorado Dealer', tip:'Always select "Colorado Dealer." No other option should be used for CO in-state deals.', source:'Manually set', warning:null },
  transaction:     { label:'Transaction', req:true, type:'select', status:'manual', placeholder:'Title Only', tip:'Always select "Title Only." This does not change for CO in-state submissions.', source:'Manually set', warning:null },
  transactionType: { label:'Transaction Type', req:true, type:'select', status:'manual', placeholder:'New Ownership', tip:'Always select "New Ownership."', source:'Manually set', warning:null },
  isDelivered:     { label:'Is Vehicle Delivered?', req:true, type:'radio', status:'manual', tip:'Check CARMA and mark Yes or No accurately. Must reflect actual delivery status for the deal.', source:'CARMA', warning:null },
  // VEHICLE
  vin:             { label:'VIN', req:true, type:'text', status:'manual', placeholder:'Enter VIN then click Populate from VIN Decode', tip:'Enter the VIN first, then click "Populate from VIN Decode" to auto-fill the remaining vehicle fields. Do not manually enter decoded fields if VIN decode is available.', source:'Title / Paperwork', warning:null },
  stockNo:         { label:'Stock #', req:false, type:'text', status:'manual', placeholder:'Stock number (e.g. 2004944254)', tip:'Must match the deal\'s stock number exactly as it appears in the system.', source:'Deal paperwork', warning:null },
  soldAs:          { label:'Vehicle Sold As', req:true, type:'select', status:'manual', placeholder:'USED', tip:'Always select "Used." This should never change for standard Carvana in-state deals.', source:'Manually set', warning:null },
  specialPurchase: { label:'Special Purchase Type', req:false, type:'select', status:'blank', placeholder:'— Leave BLANK —', tip:'Leave this field completely BLANK. Do not select any value under any circumstances.', source:'N/A — always blank', warning:null },
  vehicleType:     { label:'Vehicle Type', req:true, type:'select', status:'verify', placeholder:'Auto-populates from VIN decode', tip:'Auto-populates from VIN decode. Verify it is correct before continuing. Should typically be PASSENGER CAR or equivalent.', source:'VIN decode', warning:null },
  vehicleClass:    { label:'Vehicle Class', req:true, type:'select', status:'verify', placeholder:'Auto-populates from VIN decode', tip:'Auto-populates from VIN decode. Verify it is correct.', source:'VIN decode', warning:null },
  year:            { label:'Year', req:true, type:'text', status:'verify', placeholder:'Auto-populates', tip:'Auto-populates from VIN decode. Confirm it matches the physical title.', source:'VIN decode', warning:null },
  make:            { label:'Make', req:true, type:'text', status:'verify', placeholder:'Full make name (e.g. MAZDA)', tip:'Auto-populates as the full make name (e.g., MAZDA not Mazda). Verify it matches the title.', source:'VIN decode', warning:null },
  model:           { label:'Model', req:true, type:'text', status:'verify', placeholder:'Short form (e.g. CX-5)', tip:'Auto-populates in shortened form. Verify against the title.', source:'VIN decode', warning:null },
  style:           { label:'Style', req:true, type:'select', status:'verify', placeholder:'Verify — often incorrect', tip:'Auto-populates but is frequently wrong. Verify carefully:\n• CP = Coupe\n• CV = Convertible\n• SD = Sedan\n• UP = SUV / Utility Passenger\n• PV = Passenger Van\n• SW = Station Wagon\n• PK = Pickup Truck', source:'VIN decode — verify carefully', warning:'Frequent hold cause — always confirm the correct body style code' },
  color:           { label:'Color', req:true, type:'select', status:'manual', placeholder:'Match color across all paperwork', tip:'Must match the color exactly as shown across all deal paperwork (title, bill of sale). Inconsistency causes holds.', source:'Title / Bill of Sale', warning:'Color must be consistent across all documents' },
  unladenWeight:   { label:'Unladen Weight', req:true, type:'text', status:'manual', placeholder:'Pull from MT or AR title', tip:'Pull from the MT or AR title. If the vehicle title is Arizona (AZ), leave the auto-populated value as-is — do not change it.', source:'MT or AR title (not AZ)', warning:'AZ title: leave as-is. MT / AR title: enter value from the title' },
  fuelType:        { label:'Fuel Type', req:false, type:'select', status:'verify', placeholder:'Auto-populates from VIN decode', tip:'Should be correct from VIN decode. If wrong, check vehicle details in CARMA and correct it.', source:'VIN decode / CARMA', warning:null },
  overrideFuel:    { label:'Override Fuel Type', req:false, type:'checkbox', status:'blank', tip:'Only check this box if the fuel type decoded incorrectly and you need to correct it. Otherwise leave unchecked.', source:'Only if needed', warning:null },
  plugin:          { label:'Plug In', req:false, type:'radio', status:'verify', tip:'Always "No" unless the vehicle is fully electric or a specific plug-in hybrid model. Standard hybrids (non plug-in) should be No.', source:'Vehicle specs', warning:null },
  overridePlugin:  { label:'Override Plug In', req:false, type:'radio', status:'blank', tip:'Always "No" unless an error appears specifically when "Get Fees" is clicked. Only override at that point if prompted.', source:'Only if an error appears', warning:null },
  fleetNo:         { label:'Fleet/Non Fleet Unit Number', req:false, type:'text', status:'blank', placeholder:'— Leave Blank —', tip:'Always leave BLANK. Do not enter anything in this field.', source:'N/A — always blank', warning:null },
  odomValidity:    { label:'Odometer Validity', req:true, type:'select', status:'verify', placeholder:'ACTUAL MILEAGE', tip:'Defaults to "Actual Mileage" — this is always correct. Do not change it.', source:'Auto-populated', warning:null },
  odomReading:     { label:'Odometer Reading', req:true, type:'text', status:'manual', placeholder:'Must match bill of sale exactly', tip:'Must match the bill of sale exactly to the mile. A discrepancy here is a very common hold cause.', source:'Bill of Sale', warning:'Common hold trigger — must match bill of sale to the mile' },
  odomUnit:        { label:'Odometer Unit', req:true, type:'select', status:'verify', placeholder:'MILES', tip:'Defaults to "Actual Miles" — this is always correct. Do not change it.', source:'Auto-populated', warning:null },
  // OWNER
  ownerType:       { label:'Primary Owner', req:true, type:'select', status:'manual', placeholder:'Individual', tip:'Always select "Individual." This never changes for standard Carvana deals.', source:'Manually set', warning:null },
  lastName:        { label:'Last Name', req:true, type:'text', status:'manual', placeholder:'Exactly as on driver\'s license', tip:'Enter exactly as it appears on the driver\'s license — including hyphens, apostrophes, and spacing. Any deviation causes holds.', source:'Driver\'s License', warning:'Must match DL character-for-character' },
  firstName:       { label:'First Name', req:true, type:'text', status:'manual', placeholder:'Exactly as on driver\'s license', tip:'Enter exactly as it appears on the driver\'s license.', source:'Driver\'s License', warning:null },
  middleName:      { label:'Middle Name', req:false, type:'text', status:'manual', placeholder:'As on DL (include if present)', tip:'Include if present on the DL. Enter exactly as it appears — do not abbreviate. Leave blank only if not on the DL.', source:'Driver\'s License', warning:null },
  suffix:          { label:'Suffix', req:false, type:'text', status:'manual', placeholder:'Only if shown on DL (Jr., Sr., III)', tip:'Only enter if the suffix appears on the driver\'s license (Jr., Sr., III, etc.). Leave blank if not present on the DL.', source:'Driver\'s License', warning:null },

// STATE
// ══════════════════════════════════════════════════════════════════
let currentSec = SECTIONS[0].id;
let activeField = null;
let completed = new Set(JSON.parse(localStorage.getItem('vitu_done')||'[]'));
let finalDone  = new Set(JSON.parse(localStorage.getItem('vitu_final')||'[]'));

function save(){
  localStorage.setItem('vitu_done', JSON.stringify([...completed]));
  localStorage.setItem('vitu_final',JSON.stringify([...finalDone]));
}

// ══════════════════════════════════════════════════════════════════
// BUILD NAV
// ══════════════════════════════════════════════════════════════════
function buildNav(){
  const nav = document.getElementById('navCol');
  nav.innerHTML = `<div class="nav-group-label">Sections</div>`;
  SECTIONS.forEach(s=>{
    const done = completed.has(s.id);
    const active = s.id===currentSec;
    const rc = s.risk==='high'?'rh':s.risk==='med'?'rm':'rl';
    const rl = s.risk==='high'?'HIGH':s.risk==='med'?'MED':'LOW';
    const d = document.createElement('div');
    d.className=`nav-item${active?' active':''}`;
    d.innerHTML=`
      <span class="nav-ico">${s.icon}</span>
      <span class="nav-txt">${s.title}</span>
      <span class="nav-right-wrap">
        <span class="risk-chip ${rc}">${rl}</span>
        <span class="nav-chk ${done?'done':'pend'}">${done?'✓':'○'}</span>
      </span>`;
    d.onclick=()=>navigate(s.id);
    nav.appendChild(d);
  });
}

// ══════════════════════════════════════════════════════════════════
// BUILD PROGRESS
// ══════════════════════════════════════════════════════════════════
function updateProgress(){
  const pct = Math.round(completed.size/SECTIONS.length*100);
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progText').textContent=`${completed.size} / ${SECTIONS.length} sections`;
}

// ══════════════════════════════════════════════════════════════════
// RENDER FIELD (portal replica)
// ══════════════════════════════════════════════════════════════════
function renderField(id, wClass){
  const f = F[id];
  if(!f) return `<div class="vf ${wClass}"></div>`;
  const isActive = id===activeField;
  const sc = `status-${f.status}`;
  const req = f.req?`<span class="req">*</span>`:'';

  let input = '';
  if(f.type==='text'||f.type==='date'){
    input=`<input type="text" class="${sc}" placeholder="${f.placeholder||''}" data-fid="${id}" readonly />`;
  } else if(f.type==='select'){
    input=`<select class="${sc}" data-fid="${id}">
      <option value="">${f.placeholder||'— Select —'}</option>
    </select>`;
  } else if(f.type==='radio'){
    input=`<div class="radio-group">
      <label><input type="radio" name="${id}" data-fid="${id}"> Yes</label>
      <label><input type="radio" name="${id}" data-fid="${id}" checked> No</label>
    </div>`;
  } else if(f.type==='checkbox'){
    input=`<div class="checkbox-row">
      <input type="checkbox" id="cb_${id}" data-fid="${id}">
      <label for="cb_${id}">${f.placeholder||f.label}</label>
    </div>`;
  }

  return `
    <div class="vf ${wClass}${isActive?' active':''}" id="vf_${id}">
      <label class="vf-label" data-fid="${id}">${f.label}${req}</label>
      ${input}
    </div>`;
}

// ══════════════════════════════════════════════════════════════════
// RENDER PORTAL SECTION
// ══════════════════════════════════════════════════════════════════
function renderPortal(sec){
  const el = document.getElementById('portalCol');
  const riskCls = sec.risk;
  const riskIco = sec.risk==='high'?'🔴':sec.risk==='med'?'🟡':'🟢';
  const riskLbl = sec.risk==='high'?'High Hold Risk':sec.risk==='med'?'Medium Hold Risk':'Low Hold Risk';
  const isDone = completed.has(sec.id);
  const idx = SECTIONS.findIndex(s=>s.id===sec.id);
  const next = SECTIONS[idx+1];

  let bodyHTML = '';

  if(sec.finalSteps){
    const steps = sec.finalSteps.map((st,i)=>{
      const key=`${sec.id}-${i}`;
      const chk=finalDone.has(key);
      return `<div class="final-step-row ${chk?'done':''}" id="fsr_${i}" onclick="toggleFinal('${sec.id}',${i})">
        <input type="checkbox" ${chk?'checked':''} onclick="event.stopPropagation();toggleFinal('${sec.id}',${i})">
        <div>
          <div class="fs-label">${st.label}</div>
          <div class="fs-note">${st.note}</div>
        </div>
      </div>`;
    }).join('');
    bodyHTML=`<div class="final-checklist">${steps}</div>`;
  } else {
    let rowsHTML = sec.layout.map(row=>{
      const cells = row.map(cell=>renderField(cell.id,cell.w)).join('');
      return `<div class="vitu-row">${cells}</div>`;
    }).join('');
    if(sec.subnote){
      rowsHTML+=`<div style="padding:8px 0 0;font-size:11px;color:#475569;background:#fffbeb;border:1px solid #fde68a;border-radius:4px;padding:8px 12px;margin-top:6px;">
        📌 ${sec.subnote}</div>`;
    }
    bodyHTML=`<div class="vitu-body">${rowsHTML}</div>`;
  }

  const summaryBar = sec.hasSummaryBar?`
    <div class="vitu-summary-bar">
      <div class="vitu-summary-item"><div class="vitu-summary-label">Make, Model and Year</div><div class="vitu-summary-value">— VIN decode required —</div></div>
      <div class="vitu-summary-item"><div class="vitu-summary-label">Style</div><div class="vitu-summary-value">—</div></div>
      <div class="vitu-summary-item"><div class="vitu-summary-label">Fuel Type</div><div class="vitu-summary-value">—</div></div>
      <div class="vitu-summary-item"><div class="vitu-summary-label">Unladen/Gross Weight</div><div class="vitu-summary-value">—</div></div>
    </div>`:'';

  const populateBtn = sec.hasPopulateBtn?`<button class="vitu-populate-btn" onclick="return false">Populate from VIN Decode</button>`:'';

  el.innerHTML=`
    <div class="hold-bar ${riskCls}">
      <div class="hold-bar-ico">${riskIco}</div>
      <div class="hold-bar-body">
        <div class="hold-bar-title">${riskLbl}</div>
        <div class="hold-bar-text">${sec.riskTip}</div>
      </div>
    </div>

    <div class="vitu-section">
      <div class="vitu-sec-header">
        <span class="vitu-sec-title">${sec.title.toUpperCase()}</span>
        ${populateBtn}
      </div>
      ${summaryBar}
      ${bodyHTML}
    </div>

    <button class="mark-btn ${isDone?'done':'todo'}" id="markBtn" onclick="toggleDone('${sec.id}')">
      ${isDone?'✓ Section Complete':'✓ Mark Section Complete'}
    </button>
    ${next?`<button class="next-btn" onclick="navigate('${next.id}')">Next: ${next.title} →</button>`:''}
  `;
}

// ══════════════════════════════════════════════════════════════════
// GUIDE PANEL: idle (section checklist)
// ══════════════════════════════════════════════════════════════════
function renderGuideIdle(sec){
  const gb = document.getElementById('guideBody');
  if(!sec.layout){
    gb.innerHTML=`<div class="guide-checklist"><div class="guide-sec-badge">${sec.title}</div><p style="font-size:12px;color:#94a3b8;padding:8px 0;">Use the checkboxes in the portal to track final steps.</p></div>`;
    return;
  }

  const statusDot={auto:'dot-auto',verify:'dot-verify',manual:'dot-manual',blank:'dot-blank'};
  const badgeCls={auto:'gb-auto',verify:'gb-verify',manual:'gb-manual',blank:'gb-blank'};
  const badgeLbl={auto:'Auto',verify:'Verify',manual:'Enter',blank:'Blank'};

  const allFields = sec.layout.flat().map(cell=>cell.id);
  const rows = allFields.map(id=>{
    const f=F[id];
    if(!f)return '';
    const isAct = id===activeField;
    return `<div class="guide-field-row${isAct?' active':''}" data-fid="${id}" onclick="focusField('${id}')">
      <div class="guide-field-dot ${statusDot[f.status]}"></div>
      <div class="guide-field-name">${f.label}</div>
      <span class="guide-field-badge ${badgeCls[f.status]}">${badgeLbl[f.status]}</span>
    </div>`;
  }).join('');

  const legend=`
    <div class="gd-legend">
      <div class="gd-legend-item"><div class="guide-field-dot dot-auto"></div>Auto-populates correctly</div>
      <div class="gd-legend-item"><div class="guide-field-dot dot-verify"></div>Verify against source</div>
      <div class="gd-legend-item"><div class="guide-field-dot dot-manual"></div>Must manually enter</div>
      <div class="gd-legend-item"><div class="guide-field-dot dot-blank"></div>Leave blank</div>
    </div>`;

  gb.innerHTML=`<div class="guide-checklist">
    <div class="guide-sec-badge">${sec.title} — Click any field for guidance</div>
    ${rows}
    <div style="margin-top:12px;">${legend}</div>
  </div>`;
}

// ══════════════════════════════════════════════════════════════════
// GUIDE PANEL: active field detail
// ══════════════════════════════════════════════════════════════════
function renderGuideDetail(fid){
  const f=F[fid];
  if(!f)return;
  const gb=document.getElementById('guideBody');

  const sc={auto:'gd-sc-auto',verify:'gd-sc-verify',manual:'gd-sc-manual',blank:'gd-sc-blank'}[f.status];
  const sl={auto:'Auto-Populates',verify:'Verify Against Source',manual:'Must Manually Enter',blank:'Leave Blank'}[f.status];

  const warnHTML=f.warning?`
    <div class="gd-section-label">⚠️ Warning</div>
    <div class="gd-warning">⚠️ ${f.warning}</div>`:'';

  const tipLines = f.tip.split('\n').map(l=>l.trim()).filter(Boolean).join('<br>');

  gb.innerHTML=`
    <div class="gd-back" onclick="showIdle()">← Back to section checklist</div>
    <div class="gd-status-bar">
      <div class="gd-status-chip ${sc}">${sl}</div>
      <div class="gd-fieldname">${f.label}</div>
    </div>
    <div class="gd-content">
      <div class="gd-section-label">What to enter</div>
      <div class="gd-tip">${tipLines}</div>
      <div class="gd-section-label">Source</div>
      <div class="gd-source">📌 ${f.source}</div>
      ${warnHTML}
    </div>`;
}

// ══════════════════════════════════════════════════════════════════
// FIELD FOCUS
// ══════════════════════════════════════════════════════════════════
function focusField(fid){
  // De-highlight old
  if(activeField){
    const old=document.getElementById(`vf_${activeField}`);
    if(old) old.classList.remove('active');
    const oldRow=document.querySelector(`.guide-field-row[data-fid="${activeField}"]`);
    if(oldRow) oldRow.classList.remove('active');
  }
  activeField=fid;
  // Highlight new
  const vf=document.getElementById(`vf_${fid}`);
  if(vf) vf.classList.add('active');
  renderGuideDetail(fid);
}

function showIdle(){
  activeField=null;
  if(currentSec){
    const sec=SECTIONS.find(s=>s.id===currentSec);
    // remove active highlight
    document.querySelectorAll('.vf.active').forEach(el=>el.classList.remove('active'));
    renderGuideIdle(sec);
  }
}

// ══════════════════════════════════════════════════════════════════
// INTERACTIONS
// ══════════════════════════════════════════════════════════════════
function navigate(id){
  activeField=null;
  currentSec=id;
  buildNav();
  const sec=SECTIONS.find(s=>s.id===id);
  renderPortal(sec);
  renderGuideIdle(sec);
  document.getElementById('portalCol').scrollTop=0;

  // Wire up click events on portal fields AFTER render
  setTimeout(()=>{
    document.querySelectorAll('[data-fid]').forEach(el=>{
      el.addEventListener('click',e=>{
        const fid=el.getAttribute('data-fid')||el.closest('[data-fid]')?.getAttribute('data-fid');
        if(fid) focusField(fid);
      });
      el.addEventListener('focus',e=>{
        const fid=el.getAttribute('data-fid');
        if(fid) focusField(fid);
      });
    });
    document.querySelectorAll('.vf-label[data-fid]').forEach(el=>{
      el.addEventListener('click',e=>{
        const fid=el.getAttribute('data-fid');
        if(fid) focusField(fid);
      });
    });
  },50);
}

function toggleDone(id){
  if(completed.has(id)) completed.delete(id);
  else completed.add(id);
  save(); buildNav(); updateProgress();
  const btn=document.getElementById('markBtn');
  if(btn){
    const done=completed.has(id);
    btn.className=`mark-btn ${done?'done':'todo'}`;
    btn.textContent=done?'✓ Section Complete':'✓ Mark Section Complete';
  }
}

function toggleFinal(secId,idx){
  const key=`${secId}-${idx}`;
  if(finalDone.has(key)) finalDone.delete(key);
  else finalDone.add(key);
  save();
  const row=document.getElementById(`fsr_${idx}`);
  if(row){
    const chk=finalDone.has(key);
    row.className=`final-step-row${chk?' done':''}`;
    row.querySelector('input').checked=chk;
  }
}

// ══════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════
buildNav();
navigate(SECTIONS[0].id);
updateProgress();
</script>
</body>
</html>
